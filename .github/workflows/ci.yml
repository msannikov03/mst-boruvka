name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-graph-dev libomp-dev ninja-build

      - name: configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build -j

      - name: test
        run: ctest --test-dir build --output-on-failure
